  cabotage-app-worker:
    environment:
      - CABOTAGE_KUBERNETES_CONTEXT=orbstack
      - CABOTAGE_KUBERNETES_ENABLED=True
      - KUBECONFIG=/var/run/kube/config-cabotage
      - CABOTAGE_GITHUB_APP_ID=2855430
      - CABOTAGE_GITHUB_APP_PRIVATE_
